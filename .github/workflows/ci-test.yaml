name: Run unit + integration tests (rig)

on:
  push:
    branches:
      - main
    paths-ignore:
      - "docker/**"
      - "frontend/**"
      - "docs/**"
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [main]
    paths-ignore:
      - "docker/**"
      - "frontend/**"
      - "docs/**"

jobs:
  test:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # rig --changed-only needs git history

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.6.14"
          python-version: 3.12.9

      - name: Cache tox environments
        uses: actions/cache@v5
        with:
          path: .tox/
          key: ${{ runner.os }}-tox-uv-${{ hashFiles('**/pyproject.toml', '**/tox.ini') }}
          restore-keys: |
            ${{ runner.os }}-tox-uv-

      - name: Restore main-branch test baseline (for regression detection)
        uses: actions/cache@v5
        with:
          path: reports/previous-summary.json
          key: unstract-test-baseline-main
          restore-keys: |
            unstract-test-baseline-

      - name: Install tox with UV
        run: uv tool install tox --with tox-uv

      - name: Run unit + integration tiers
        id: tox
        # On main, fail on uncovered critical paths and update the baseline
        # cache. On PRs, gaps are warnings (visible in the summary).
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            tox -e unit,integration -- --fail-on-critical-gap --update-baseline
          else
            tox -e unit,integration
          fi

      - name: Render combined test report to PR
        uses: marocchino/sticky-pull-request-comment@70d2764d1a7d5d9560b100cbea0077fc8f633987 # v3.0.2
        if: always() && hashFiles('reports/combined-test-report.md') != '' && github.event.pull_request.head.repo.fork == false
        with:
          header: test-results
          recreate: true
          path: reports/combined-test-report.md

      - name: Output combined report to job summary
        if: always() && hashFiles('reports/summary.md') != ''
        shell: bash
        run: |
          cat reports/summary.md >> $GITHUB_STEP_SUMMARY

      - name: Upload reports artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-unit-integration
          path: reports/
          if-no-files-found: ignore
          retention-days: 14
