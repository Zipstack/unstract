name: Run tests (unit + integration + e2e)

# One job runs every tier, then combines them into a single PR comment so e2e
# coverage (e.g. auth-login) shows up alongside unit/integration. Build + e2e
# must share a runner (images don't travel across jobs). Tiers run as separate
# rig invocations — NOT `rig run all` — because the rig picks one infra mode per
# invocation: mixing compose-platform e2e with testcontainers integration in one
# call points the backend at the compose DB hostname, unreachable from pytest.
on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      # One tag end to end: docker-compose.build.yaml tags images with VERSION,
      # the base compose boots ${VERSION}, and the test overlay
      # (tests/compose/docker-compose.test.yaml) pins its services via
      # UNSTRACT_TEST_VERSION. Keep them identical.
      VERSION: ${{ github.sha }}
      UNSTRACT_TEST_VERSION: ${{ github.sha }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0 # rig --changed-only needs git history
          # No git push/fetch after checkout needs the token, and reports/ is
          # uploaded as an artifact — don't persist creds into .git/config.
          persist-credentials: false

      - name: Login to Docker Hub
        # Authenticated pulls of base images avoid the anonymous rate limit
        # shared by all GitHub runners. Forks have no access to secrets.
        if: github.event.pull_request == null || github.event.pull_request.head.repo.fork == false
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          version: "0.6.14"
          python-version: 3.12.9

      - name: Install tox with UV
        run: uv tool install tox --with tox-uv

      - name: Cache tox environments
        uses: actions/cache@v5
        with:
          path: .tox/
          key: ${{ runner.os }}-tox-uv-all-${{ hashFiles('**/pyproject.toml', '**/tox.ini') }}
          restore-keys: |
            ${{ runner.os }}-tox-uv-all-
            ${{ runner.os }}-tox-uv-

      - name: Validate test manifests
        # Cheap pre-flight before the multi-minute image build.
        run: tox -e rig -- validate

      - name: Set up env files
        run: ./run-platform.sh -e

      - name: Build service images
        run: docker compose -f docker/docker-compose.build.yaml build

      - name: Restore main-branch test baseline (for regression detection)
        # Restore-only here; the run step below is the sole writer (main only).
        uses: actions/cache/restore@v5
        with:
          path: reports/previous-summary.json
          key: unstract-test-baseline-main-${{ github.run_id }}
          restore-keys: |
            unstract-test-baseline-main-

      - name: Run tiers (unit/integration on testcontainers, e2e on compose)
        env:
          UNSTRACT_E2E_RUNTIME: compose
        # One invocation per tier so each gets its own infra and compose is up
        # only for e2e. Per-tier --fail-on-critical-gap gates in-scope gaps; the
        # combine step below merges every tier's junit into one evaluation. Don't
        # abort on a red tier — the combine + comment must still run.
        run: |
          set +e
          rc=0
          for tier in unit integration e2e; do
            tox -e "$tier" -- --fail-on-critical-gap || rc=1
            # Suffix per tier: a bare reports/.coverage would clobber across
            # tiers; `report combine` unions the `.coverage.*` glob.
            if [ -f reports/.coverage ]; then
              mv reports/.coverage "reports/.coverage.tier-$tier"
            fi
          done
          echo "TIERS_RC=$rc" >> "$GITHUB_ENV"

      - name: Combine tiers into one report
        if: always()
        # Unifies all tiers' junit into a single critical-path evaluation + PR
        # comment. --update-baseline is main-only and green-only — a PR must not
        # write main's regression baseline, nor a red build a partial one.
        run: |
          flags=""
          if [ "${{ github.ref }}" = "refs/heads/main" ] && [ "${TIERS_RC:-1}" = "0" ]; then
            flags="--update-baseline"
          fi
          tox -e rig -- report combine $flags

      - name: Save updated baseline
        # actions/cache saves only on a miss; the run id keys each main build a
        # fresh entry, and restore-keys' prefix pulls the latest next run.
        if: github.ref == 'refs/heads/main'
        uses: actions/cache/save@v5
        with:
          path: reports/previous-summary.json
          key: unstract-test-baseline-main-${{ github.run_id }}

      - name: Capture docker compose logs on failure
        if: failure()
        run: |
          mkdir -p reports
          docker compose -p unstract-test \
            -f docker/docker-compose.yaml \
            -f tests/compose/docker-compose.test.yaml \
            logs --no-color > reports/docker-compose-logs.txt || true

      - name: Render combined test report to PR
        uses: marocchino/sticky-pull-request-comment@70d2764d1a7d5d9560b100cbea0077fc8f633987 # v3.0.2
        if: always() && hashFiles('reports/combined-test-report.md') != '' && github.event.pull_request.head.repo.fork == false
        with:
          header: test-results
          recreate: true
          path: reports/combined-test-report.md

      - name: Output combined report to job summary
        if: always() && hashFiles('reports/summary.md') != ''
        shell: bash
        run: cat reports/summary.md >> $GITHUB_STEP_SUMMARY

      - name: Upload reports artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: test-reports
          path: reports/
          if-no-files-found: ignore
          retention-days: 14

      - name: Fail if any tier failed
        # Runs after the report/comment so a red tier still posts its results;
        # this step makes the job (and its required check) red.
        if: always()
        run: '[ "${TIERS_RC:-1}" = "0" ] || exit 1'
