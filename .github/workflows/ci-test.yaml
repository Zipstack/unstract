name: Run unit + integration tests (rig)

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [main]

jobs:
  # Path filtering lives at the JOB level, not as trigger paths-ignore: a
  # workflow that never triggers creates no check run, so a required status
  # check would block the PR forever ("Expected — waiting for status"). A job
  # skipped via `if:` still reports a check run (conclusion: skipped), which
  # required checks treat as passing.
  changes:
    runs-on: ubuntu-latest
    outputs:
      relevant: ${{ steps.filter.outputs.relevant }}
    steps:
      - name: Checkout repository
        # paths-filter needs the local git history for push events.
        uses: actions/checkout@v6

      - name: Check for changes outside ignored paths
        uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        id: filter
        with:
          # `every`: a file counts as relevant only if it matches ALL the
          # negated globs, i.e. lies outside every ignored dir.
          predicate-quantifier: every
          filters: |
            relevant:
              - "!docker/**"
              - "!frontend/**"
              - "!docs/**"

  # The two tiers share no state (separate runners, disjoint groups), so they
  # run as parallel matrix legs. Anything that needs both tiers' results —
  # report aggregation, coverage union, baseline update — happens in `report`.
  test:
    needs: changes
    if: needs.changes.outputs.relevant == 'true' && github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    strategy:
      # One tier failing must not cancel the other; the report job needs
      # whatever results exist from both.
      fail-fast: false
      matrix:
        tier: [unit, integration]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # rig --changed-only needs git history

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          version: "0.6.14"
          python-version: 3.12.9

      - name: Cache tox environments
        uses: actions/cache@v5
        with:
          path: .tox/
          # Tier in the key: the legs build different tox envs, and parallel
          # saves to one key would race (first save wins, the other is lost).
          key: ${{ runner.os }}-tox-uv-${{ matrix.tier }}-${{ hashFiles('**/pyproject.toml', '**/tox.ini') }}
          restore-keys: |
            ${{ runner.os }}-tox-uv-${{ matrix.tier }}-
            ${{ runner.os }}-tox-uv-

      - name: Restore main-branch test baseline (for regression detection)
        # Restore-only: tier legs read the baseline to detect regressions but
        # never write it. A full cache action here would save the unchanged
        # file under this run's key first and block the report job's merged
        # save of the same key. The report job owns the write.
        #
        # The unit/integration lane keeps a SEPARATE baseline from the e2e
        # workflow because their `scope_groups` don't overlap — restoring an
        # e2e-tier baseline here would flag every e2e-covered path as a
        # regression in this lane (and vice versa). Each workflow is the
        # source of truth for the paths covered by its own tiers.
        uses: actions/cache/restore@v5
        with:
          path: reports/previous-summary.json
          key: unstract-test-baseline-ut-main-${{ github.run_id }}
          restore-keys: |
            unstract-test-baseline-ut-main-
            unstract-test-baseline-ut-

      - name: Install tox with UV
        run: uv tool install tox --with tox-uv

      - name: Validate test manifests
        # Cheap pre-flight: catches groups.yaml / critical_paths.yaml schema
        # errors before we spend minutes on tier runs.
        run: tox -e rig -- validate

      - name: Run ${{ matrix.tier }} tier
        # Baseline updates moved to the report job (`report combine
        # --update-baseline`): parallel per-tier writes would race the cache.
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            tox -e ${{ matrix.tier }} -- --fail-on-critical-gap
          else
            tox -e ${{ matrix.tier }}
          fi

      - name: Suffix coverage data for cross-tier merge
        # Each tier ends with a bare reports/.coverage; two artifacts with the
        # same bare name would clobber on download. A suffixed name matches
        # the `.coverage.*` glob `report combine` unions.
        if: always()
        run: |
          if [ -f reports/.coverage ]; then
            mv reports/.coverage "reports/.coverage.tier-${{ matrix.tier }}"
          fi

      - name: Upload tier reports artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reports-${{ matrix.tier }}
          # Baseline excluded: it's cache-managed, and a stale copy inside the
          # artifact would overwrite the report job's freshly restored one.
          path: |
            reports/
            !reports/previous-summary.json
          if-no-files-found: ignore
          retention-days: 14

  report:
    needs: test
    # `always()` so a red tier still gets a PR report; skip only when the
    # tiers were themselves skipped (irrelevant paths / draft).
    if: always() && needs.test.result != 'skipped'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          version: "0.6.14"
          python-version: 3.12.9

      - name: Cache tox environments
        uses: actions/cache@v5
        with:
          path: .tox/
          key: ${{ runner.os }}-tox-uv-rig-${{ hashFiles('**/pyproject.toml', '**/tox.ini') }}
          restore-keys: |
            ${{ runner.os }}-tox-uv-rig-
            ${{ runner.os }}-tox-uv-

      - name: Restore main-branch test baseline
        uses: actions/cache/restore@v5
        with:
          path: reports/previous-summary.json
          key: unstract-test-baseline-ut-main-${{ github.run_id }}
          restore-keys: |
            unstract-test-baseline-ut-main-
            unstract-test-baseline-ut-

      - name: Install tox with UV
        run: uv tool install tox --with tox-uv

      - name: Download tier reports
        uses: actions/download-artifact@v4
        with:
          pattern: reports-*
          path: reports/
          merge-multiple: true

      - name: Combine reports from both tiers
        # On green main builds, also merge covered paths into the baseline —
        # the single writer replacing the per-tier --update-baseline runs.
        # The rig refuses the merge itself if any group is red.
        run: |
          flags=""
          if [ "${{ github.ref }}" = "refs/heads/main" ] && [ "${{ needs.test.result }}" = "success" ]; then
            flags="--update-baseline"
          fi
          tox -e rig -- report combine $flags

      - name: Save updated baseline
        # actions/cache only saves on a cache miss; the run id in the key
        # makes each main build a fresh entry, and restore-keys' prefix match
        # pulls the most recent one next run.
        if: github.ref == 'refs/heads/main'
        uses: actions/cache/save@v5
        with:
          path: reports/previous-summary.json
          key: unstract-test-baseline-ut-main-${{ github.run_id }}

      - name: Render combined test report to PR
        uses: marocchino/sticky-pull-request-comment@70d2764d1a7d5d9560b100cbea0077fc8f633987 # v3.0.2
        if: always() && hashFiles('reports/combined-test-report.md') != '' && github.event.pull_request.head.repo.fork == false
        with:
          header: test-results
          recreate: true
          path: reports/combined-test-report.md

      - name: Output combined report to job summary
        if: always() && hashFiles('reports/summary.md') != ''
        shell: bash
        run: |
          cat reports/summary.md >> $GITHUB_STEP_SUMMARY

      - name: Upload reports artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-unit-integration
          path: reports/
          if-no-files-found: ignore
          retention-days: 14

      - name: Fail if any tier failed
        # Makes this job the single branch-protection check: for a matrix
        # job, `result` is `success` only when every leg passed, so either
        # tier failing (or being cancelled) turns `report` red too.
        if: always()
        run: |
          [ "${{ needs.test.result }}" = "success" ] || exit 1
