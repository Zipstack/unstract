# Unstract test rig — group definitions.
#
# Each group is the unit of selection. A group's `paths` are passed to pytest
# (or another runner). `depends_on` is expanded transitively before execution.
#
# Add new groups by appending to this file. Validate with:
#   python -m tests.rig list-groups
#   python -m tests.rig expand <group>
version: 1

defaults:
  timeout_seconds: 600
  parallel: true
  runner: pytest

groups:
  # ── Unit tier: pure pytest, no external services ───────────────────────────
  unit-sdk1:
    tier: unit
    workdir: unstract/sdk1
    paths: [tests]
    markers: "not slow and not integration"
    uv_sync_group: test

  unit-runner:
    tier: unit
    workdir: runner
    # Runner co-locates its tests under src/. Pytest will recurse from here.
    paths: [src]
    pip_install:
      - "flask~=3.1.0"
      - "docker==6.1.3"
      - "redis~=5.2.1"
      - "python-dotenv>=1.0.0"
      - "kubernetes"
    install_editable: true

  unit-prompt-service:
    tier: unit
    workdir: prompt-service
    paths: [src/unstract/prompt_service/tests/unit]
    uv_sync_group: test
    # The parent conftest pulls in heavy adapter chains (pinecone etc.); unit
    # tests must not depend on integration fixtures.
    pytest_extra: ["--noconftest"]
    markers: "not slow"

  unit-platform-service:
    tier: unit
    workdir: platform-service
    paths: [tests]
    uv_sync_group: test
    optional: true   # service has only a couple of tests today; don't fail rig if module is absent

  unit-workers:
    tier: unit
    workdir: workers
    paths: [tests, shared/tests]
    markers: "unit"
    uv_sync_group: test

  unit-backend:
    tier: unit
    workdir: backend
    paths: [.]
    uv_sync_group: test
    env:
      DJANGO_SETTINGS_MODULE: backend.settings.test_cases
    # Backend ORM imports require a real Postgres; rig provisions it via
    # testcontainers or compose when this group is selected.
    requires_services: [postgres, redis]
    optional: true   # gated until backend test_cases settings are complete

  unit-connectors:
    tier: unit
    workdir: unstract/connectors
    paths: [tests]
    uv_sync_group: test
    optional: true

  unit-core:
    tier: unit
    workdir: unstract/core
    paths: [tests]
    # No `test` uv group in unstract/core today; rig will still inject pytest plugins.
    install_editable: true
    optional: true

  unit-tool-registry:
    tier: unit
    workdir: unstract/tool-registry
    paths: [tests]
    uv_sync_group: test
    optional: true

  # ── Integration tier: needs infra but not full platform ────────────────────
  integration-workflow-execution:
    tier: integration
    paths: [tests/integration/workflow_execution]
    requires_services: [postgres, redis, minio]
    depends_on: [unit-sdk1, unit-workers]
    optional: true   # placeholder until tests are authored

  # ── E2E tier: real HTTP against running platform ───────────────────────────
  e2e-smoke:
    tier: e2e
    paths: [tests/e2e/smoke]
    requires_platform: true
    critical: true
    timeout_seconds: 1200
    depends_on: [unit-sdk1, unit-workers]

  e2e-workflow:
    tier: e2e
    paths: [tests/e2e/workflows]
    requires_platform: true
    critical: true
    depends_on: [e2e-smoke]
    optional: true

  e2e-api-deployment:
    tier: e2e
    paths: [tests/e2e/api_deployment]
    requires_platform: true
    critical: true
    depends_on: [e2e-smoke]
    optional: true

  e2e-prompt-studio:
    tier: e2e
    paths: [tests/e2e/prompt_studio]
    requires_platform: true
    critical: true
    depends_on: [e2e-smoke]
    optional: true

  e2e-hurl:
    tier: e2e
    runner: hurl
    paths: [tests/e2e/hurl]
    requires_platform: true
    optional: true
